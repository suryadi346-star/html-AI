name: Release Build

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-zip:
    name: Build ZIP Artifact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          mkdir dist
          zip -r dist/app.zip . -x "*.git*" "node_modules/*" "__pycache__/*"

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: dist/app.zip

  build-apk:
    name: Build APK (Cordova)
    runs-on: ubuntu-latest
    needs: build-zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova App
        run: |
          cordova create app com.example.app MyApp
          cd app
          cordova platform add android

      - name: Copy Web Files
        run: |
          cp -r * app/www/

      - name: Build APK
        run: |
          cd app
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-zip, build-apk]

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/app.zip
            app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
